name: Unzip Archive
on: [push]  # 每次推送代码时触发解压

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 检出仓库代码

      - name: Decompress files
        uses: somaz94/compress-decompress@v1  # 使用第三方解压 Action
        with:
          command: decompress
          source: your-archive.zip  # 替换为你的压缩包文件名（如 folder.zip）
          format: zip  # 压缩格式（zip/tar/tgz）
          dest: ./  # 解压到仓库根目录
